<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CustomAnki AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { width: 100%; max-width: 400px; padding: 30px; background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="login-card text-center">
    <h3 class="mb-4 text-primary">CustomAnki AI</h3>
    <p class="text-muted">Enter your Gemini API Key to start</p>
    
    {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    <form action="/login" method="POST">
        <div class="mb-3">
            <input type="password" name="api_key" class="form-control" placeholder="Enter API Key manually..." required>
        </div>
        <button type="submit" class="btn btn-primary w-100 mb-3">Unlock with Key</button>
    </form>
    
    <div class="mb-3">
        <div class="text-muted mb-2">OR</div>
        <a href="/login/google" class="btn btn-outline-dark w-100 d-flex align-items-center justify-content-center">
            <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="20" class="me-2">
            Sign in with Google
        </a>
    </div>
    
    <div class="mt-4">
        <small class="text-muted">
            Don't have a key? Get it at <a href="https://aistudio.google.com/app/apikey" target="_blank">Google AI Studio</a>
        </small>
    </div>
</div>

</body>
</html>
